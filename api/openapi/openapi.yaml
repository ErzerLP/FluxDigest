openapi: 3.1.0
info:
  title: RSS AI Digest API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /metrics:
    get:
      summary: Export minimal Prometheus metrics
      responses:
        '200':
          description: Prometheus text format
          content:
            text/plain:
              schema:
                type: string
  /api/v1/articles:
    get:
      summary: List articles
      responses:
        '200':
          description: Article list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Article'
        '503':
          description: Article reader is not configured
  /api/v1/dossiers:
    get:
      summary: List active dossiers
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Dossier list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DossierListResponse'
        '400':
          description: Invalid limit
        '503':
          description: Dossier reader is not configured
  /api/v1/dossiers/{id}:
    get:
      summary: Get dossier detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dossier detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DossierDetail'
        '503':
          description: Dossier reader is not configured
  /api/v1/digests/latest:
    get:
      summary: Get latest digest
      responses:
        '200':
          description: Latest digest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Digest'
        '503':
          description: Digest reader is not configured
  /api/v1/profiles/{profileType}/active:
    get:
      summary: Get active profile by type
      parameters:
        - in: path
          name: profileType
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '503':
          description: Profile reader is not configured
  /api/v1/admin/status:
    get:
      summary: Get admin dashboard status
      responses:
        '200':
          description: Admin dashboard status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatus'
        '503':
          description: Admin status reader is not configured
  /api/v1/admin/configs:
    get:
      summary: Get admin configuration snapshot
      responses:
        '200':
          description: Admin configuration snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminConfigSnapshot'
        '503':
          description: Admin config reader is not configured
  /api/v1/admin/configs/llm:
    put:
      summary: Update LLM admin config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLLMConfigInput'
      responses:
        '200':
          description: Created active profile version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileVersion'
        '400':
          description: Invalid request body
        '500':
          description: Update failed
        '503':
          description: Admin llm updater is not configured
  /api/v1/admin/test/llm:
    post:
      summary: Test LLM connectivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LLMTestDraft'
      responses:
        '200':
          description: Connectivity test succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectivityTestResult'
        '400':
          description: Invalid request body
        '500':
          description: Connectivity test failed
        '503':
          description: Admin llm tester is not configured
  /api/v1/admin/jobs:
    get:
      summary: List recent admin job runs
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Recent job runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRunListResponse'
        '400':
          description: Invalid limit
        '500':
          description: Query failed
        '503':
          description: Admin job reader is not configured
  /api/v1/jobs/daily-digest:
    post:
      summary: Trigger daily digest job
      security:
        - apiKeyAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                trigger_at:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Job skipped because the same digest date is already queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobTriggerResponse'
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobTriggerResponse'
        '400':
          description: Invalid request body or trigger_at
        '401':
          description: Invalid API key
        '500':
          description: Job enqueue failed
        '503':
          description: Job trigger is not configured
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Article:
      type: object
      properties:
        id:
          type: string
        miniflux_entry_id:
          type: integer
          format: int64
        feed_id:
          type: integer
          format: int64
        feed_title:
          type: string
        title:
          type: string
        author:
          type: string
        url:
          type: string
          format: uri
        title_translated:
          type: string
        summary_translated:
          type: string
        content_translated:
          type: string
        core_summary:
          type: string
        key_points:
          type: array
          items:
            type: string
        topic_category:
          type: string
        importance_score:
          type: number
          format: float
    Digest:
      type: object
      properties:
        digest_date:
          type: string
          format: date
        title:
          type: string
        subtitle:
          type: string
        content_markdown:
          type: string
        content_html:
          type: string
        remote_url:
          type: string
        publish_state:
          type: string
        publish_error:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/DigestItem'
    DigestItem:
      type: object
      properties:
        dossier_id:
          type: string
        section_name:
          type: string
        importance_bucket:
          type: string
        position:
          type: integer
        is_featured:
          type: boolean
    DossierListItem:
      type: object
      properties:
        id:
          type: string
        article_id:
          type: string
        digest_date:
          type: string
          format: date
        title_translated:
          type: string
        core_summary:
          type: string
        topic_category:
          type: string
        importance_score:
          type: number
          format: float
        priority_level:
          type: string
        publish_suggestion:
          type: string
        publish_state:
          type: string
        created_at:
          type: string
          format: date-time
    DossierListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DossierListItem'
    DossierDetail:
      type: object
      properties:
        id:
          type: string
        article_id:
          type: string
        processing_id:
          type: string
        digest_date:
          type: string
          format: date
        version:
          type: integer
        is_active:
          type: boolean
        title_translated:
          type: string
        summary_polished:
          type: string
        core_summary:
          type: string
        key_points:
          type: array
          items:
            type: string
        topic_category:
          type: string
        importance_score:
          type: number
          format: float
        recommendation_reason:
          type: string
        reading_value:
          type: string
        priority_level:
          type: string
        content_polished_markdown:
          type: string
        analysis_longform_markdown:
          type: string
        background_context:
          type: string
        impact_analysis:
          type: string
        debate_points:
          type: array
          items:
            type: string
        target_audience:
          type: string
        publish_suggestion:
          type: string
        suggestion_reason:
          type: string
        suggested_channels:
          type: array
          items:
            type: string
        suggested_tags:
          type: array
          items:
            type: string
        suggested_categories:
          type: array
          items:
            type: string
        publish_state:
          type: string
        publish_channel:
          type: string
        remote_url:
          type: string
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Profile:
      type: object
      properties:
        profile_type:
          type: string
        name:
          type: string
        version:
          type: integer
        is_active:
          type: boolean
        payload:
          type: object
          additionalProperties: true
    ProfileVersion:
      type: object
      properties:
        id:
          type: string
        profile_type:
          type: string
        name:
          type: string
        version:
          type: integer
        is_active:
          type: boolean
    SecretView:
      type: object
      properties:
        is_set:
          type: boolean
        masked_value:
          type: string
    LLMConfigView:
      type: object
      properties:
        base_url:
          type: string
        model:
          type: string
        api_key:
          $ref: '#/components/schemas/SecretView'
    AdminConfigSnapshot:
      type: object
      properties:
        llm:
          $ref: '#/components/schemas/LLMConfigView'
    IntegrationState:
      type: object
      properties:
        configured:
          type: boolean
        last_test_status:
          type: string
        last_test_at:
          type: string
          format: date-time
    AdminStatus:
      type: object
      properties:
        system:
          type: object
          properties:
            api:
              type: string
            db:
              type: string
            redis:
              type: string
        integrations:
          type: object
          properties:
            llm:
              $ref: '#/components/schemas/IntegrationState'
            miniflux:
              $ref: '#/components/schemas/IntegrationState'
            publisher:
              $ref: '#/components/schemas/IntegrationState'
        runtime:
          type: object
          properties:
            latest_digest_date:
              type: string
              format: date
            latest_digest_status:
              type: string
            latest_job_status:
              type: string
    SecretInput:
      type: object
      properties:
        mode:
          type: string
          enum: [keep, replace, clear]
        value:
          type: string
    UpdateLLMConfigInput:
      type: object
      properties:
        base_url:
          type: string
        model:
          type: string
        api_key:
          $ref: '#/components/schemas/SecretInput'
    LLMTestDraft:
      type: object
      properties:
        base_url:
          type: string
        model:
          type: string
        api_key:
          type: string
    ConnectivityTestResult:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        latency_ms:
          type: integer
          format: int64
    JobRunRecord:
      type: object
      properties:
        id:
          type: string
        job_type:
          type: string
        trigger_source:
          type: string
        status:
          type: string
        digest_date:
          type: string
          format: date
        detail:
          type: object
          additionalProperties: true
        error_message:
          type: string
        requested_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
    JobRunListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobRunRecord'
    JobTriggerResponse:
      type: object
      properties:
        digest_date:
          type: string
          format: date
        status:
          type: string
          enum: [accepted, skipped]
        trigger_at:
          type: string
          format: date-time
